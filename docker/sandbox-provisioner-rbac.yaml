apiVersion: v1
kind: Namespace
metadata:
  name: yuxi-sandbox

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-provisioner
  namespace: yuxi-sandbox

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-provisioner
  namespace: yuxi-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-provisioner
  namespace: yuxi-sandbox
subjects:
  - kind: ServiceAccount
    name: sandbox-provisioner
    namespace: yuxi-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-provisioner
